<h2>Edit Tenant: {{ tenant.name }}</h2>

<h3>Existing Branches</h3>
<ul>
    {% for loc in tenant.locations %}
        <li>{{ loc.name }}</li>
    {% endfor %}
</ul>

<form method="POST">
    <h3>Add New Branches</h3>

    <div id="branches">
        <input name="branches[]" placeholder="Branch Name"><br>
    </div>

    <button type="button" onclick="addBranch()">➕ Add Branch</button>

    <br><br>
    <button type="submit">Save</button>
</form>

<script>
function addBranch() {
    const div = document.getElementById("branches");
    div.innerHTML += '<input name="branches[]" placeholder="Branch Name"><br>';
}
</script>
