{% extends "shared/base.html" %}

{% block content %}

<h2>Branches for {{ tenant.name }}</h2>

<table border="1" cellpadding="8">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Brand</th>
        <th>Actions</th>
    </tr>

    {% for brand in tenant.brands %}
        {% for branch in brand.branches %}
        <tr>
            <td>{{ branch.id }}</td>
            <td>{{ branch.name }}</td>
            <td>{{ brand.name }}</td>

            <td>
                <form method="POST"
                      action="{{ url_for('admin.delete_branch', branch_id=branch.id) }}"
                      style="display:inline;">
                    <button type="submit"
                            onclick="return confirm('Delete this branch?')">
                        🗑 Delete
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    {% endfor %}
</table>

<a href="{{ url_for('admin.dashboard') }}">⬅ Back</a>

{% endblock %}
