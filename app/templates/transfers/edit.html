{% extends "shared/base.html" %}

{% block content %}

<h2>Edit Transfer #{{ transfer.id }}</h2>

<form method="POST">

    <!-- SOURCE -->
    <label>Source Warehouse</label><br>

    <select name="source_warehouse_id" required>

        {% for w in warehouses %}
        <option value="{{ w.id }}"
            {% if w.id == transfer.source_warehouse_id %}selected{% endif %}>

            {{ w.name }}

            {% if w.branch_id %}
                (Branch)
            {% else %}
                (Main)
            {% endif %}

        </option>
        {% endfor %}

    </select>

    <br><br>

    <!-- DESTINATION -->
    <label>Destination Warehouse</label><br>

    <select name="destination_warehouse_id" required>

        {% for w in warehouses %}
        <option value="{{ w.id }}"
            {% if w.id == transfer.destination_warehouse_id %}selected{% endif %}>

            {{ w.name }}

            {% if w.branch_id %}
                (Branch)
            {% else %}
                (Main)
            {% endif %}

        </option>
        {% endfor %}

    </select>

    <br><br>

    <!-- PRODUCTS -->
    <h3>Products</h3>

    <table border="1" cellpadding="8">

        <tr>
            <th>Product</th>
            <th>Available Stock</th>
            <th>Transfer Quantity</th>
        </tr>

        {% for item in inventory %}
        <tr>

            <td>{{ item.product.name }}</td>

            <td>{{ item.quantity }}</td>

            <td>

                <input type="number"
                       name="qty_{{ item.product.id }}"
                       min="0"
                       max="{{ item.quantity }}"
                       value="{{ existing_items.get(item.product.id, 0) }}">

            </td>

        </tr>
        {% endfor %}

    </table>

    <br>

    <button type="submit">
        💾 Save Changes
    </button>

</form>

<hr>

<a href="{{ url_for('transfers.list_transfers') }}">
    ⬅ Back to Transfers
</a>

{% endblock %}
