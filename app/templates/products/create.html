{% extends "shared/base.html" %}

{% block content %}

<h2>Add Product</h2>

<form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" required><br><br>

    <button type="submit">Save</button>
</form>

{% endblock %}
