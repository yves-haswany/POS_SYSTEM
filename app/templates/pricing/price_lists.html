<h2>
    Create Price List
</h2>

<form method="POST">

    <!-- ========================= -->
    <!-- PRICE LIST INFO -->
    <!-- ========================= -->

    <label>Name</label>
    <input
        type="text"
        name="name"
        required
    >

    <label>Currency</label>
    <select name="currency">

        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="LBP">LBP</option>

    </select>

    <hr>

    <!-- ========================= -->
    <!-- PRODUCT SELECT -->
    <!-- ========================= -->

    <h3>Add Product Variant</h3>

    <label>Product</label>

    <select id="productSelect">

        <option value="">
            Select Product
        </option>

        {% for product in products %}
            <option value="{{ product.id }}">
                {{ product.name }}
            </option>
        {% endfor %}

    </select>

    <br><br>

    <label>Variant</label>

    <select id="variantSelect">

        <option value="">
            Select Variant
        </option>

    </select>

    <button
        type="button"
        onclick="addVariant()"
    >
        Add
    </button>

    <hr>

    <!-- ========================= -->
    <!-- PRICE TABLE -->
    <!-- ========================= -->

    <h3>Price List Items</h3>

    <table
        border="1"
        cellpadding="8"
        id="priceTable"
    >

        <thead>

            <tr>

                <th>Product</th>
                <th>Variant</th>
                <th>Base Price</th>
                <th>Price List Price</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

    <br>

    <button type="submit">
        💾 Save Price List
    </button>

</form>

<script>

/* ======================================
   LOAD VARIANTS WHEN PRODUCT CHANGES
====================================== */

document
.getElementById("productSelect")
.addEventListener("change", async function () {

    let productId = this.value;

    let variantSelect =
        document.getElementById("variantSelect");

    variantSelect.innerHTML =
        "<option value=''>Select Variant</option>";

    if (!productId)
        return;

    let response = await fetch(
        `/pricing/product-variants?product_id=${productId}`
    );

    let variants = await response.json();

    variants.forEach(v => {

        let option = document.createElement("option");

        option.value = v.id;
        option.textContent = v.attributes;

        option.dataset.product = v.product;
        option.dataset.price = v.price;
        option.dataset.label = v.attributes;

        variantSelect.appendChild(option);

    });

});


/* ======================================
   ADD VARIANT TO TABLE
====================================== */

function addVariant() {

    let select =
        document.getElementById("variantSelect");

    let option =
        select.options[select.selectedIndex];

    if (!option.value)
        return;

    let table =
        document.querySelector("#priceTable tbody");

    // prevent duplicates
    let existing =
        table.querySelector(
            `[data-variant='${option.value}']`
        );

    if (existing) {
        alert("Variant already added");
        return;
    }

    let row = document.createElement("tr");

    row.setAttribute("data-variant", option.value);

    row.innerHTML = `
        <td>
            ${option.dataset.product}
        </td>

        <td>
            ${option.dataset.label}
        </td>

        <td>
            ${option.dataset.price}
        </td>

        <td>
            <input
                type="number"
                step="0.01"
                name="price_${option.value}"
                required
            >
        </td>

        <td>
            <button
                type="button"
                onclick="removeVariant(this)"
            >
                Remove
            </button>
        </td>
    `;

    table.appendChild(row);

}


/* ======================================
   REMOVE ROW
====================================== */

function removeVariant(button) {

    button.closest("tr").remove();

}

</script>
